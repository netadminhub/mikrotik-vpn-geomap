version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mikrotik_geo_vpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mikrotik_geo}
      POSTGRES_USER: ${POSTGRES_USER:-mikrotik_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mikrotik_pass}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - mikrotik_geo_vpn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mikrotik_user} -d ${POSTGRES_DB:-mikrotik_geo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mikrotik_geo_vpn_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mikrotik_user}:${POSTGRES_PASSWORD:-mikrotik_pass}@postgres:5432/${POSTGRES_DB:-mikrotik_geo}
      MIKROTIK_HOST: ${MIKROTIK_HOST}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USER: ${MIKROTIK_USER}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD}
      MIKROTIK_USE_SSL: ${MIKROTIK_USE_SSL:-false}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      GEOIP_API_URL: ${GEOIP_API_URL:-http://ip-api.com/json}
    volumes:
      - ./data/backend:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mikrotik_geo_vpn_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: mikrotik_geo_vpn_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - mikrotik_geo_vpn_network

networks:
  mikrotik_geo_vpn_network:
    driver: bridge
